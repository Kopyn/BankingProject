spring:
  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: customer-route
              uri: ${CUSTOMER_SERVICE_URI:http://localhost:8082}
              predicates:
                - Path=/customers/**
              filters:
                - AddRequestHeader=X-Tenant,acme
                - AddResponseHeader=X-Customer,customer

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8080/realms/myrealm


  application:
    name: gateway-service
server:
  port: 8081
